<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1 id="first">Hello Good morning</h1>
    <h1>Hello Good Night</h1>

    <script>
      const firstId = document.getElementById("first");
      firstId.addEventListener("click", () => {
        firstId.textContent = "Hello World";
        firstId.style.background = "orange";
      });
    </script>
  </body>
</html>
